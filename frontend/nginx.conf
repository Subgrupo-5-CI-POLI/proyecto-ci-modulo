# =============================================================================
#  Configuración de Nginx - Frontend con proxy inverso
# =============================================================================
#  Este archivo configura Nginx para:
#    1. Servir los archivos estáticos del frontend (HTML, CSS, JS).
#    2. Actuar como PROXY INVERSO para las peticiones que empiecen con /api/,
#       reenviándolas al contenedor "backend" en el puerto 3000.
#
#  El hostname "backend" se resuelve automáticamente gracias al DNS interno
#  de Docker (el nombre del servicio definido en docker-compose.yml).
# =============================================================================

server {
    # Nginx escucha en el puerto 80 dentro del contenedor
    # (docker-compose mapea este puerto al 8080 del host)
    listen 80;
    server_name localhost;

    # Directorio donde están los archivos estáticos del frontend
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------------
    # Ubicación raíz: sirve los archivos estáticos del frontend
    # -------------------------------------------------------------------------
    location / {
        # Intenta servir el archivo solicitado; si no existe, devuelve index.html
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------------------
    # Proxy inverso: redirige las peticiones /api/* al contenedor backend
    # -------------------------------------------------------------------------
    # Aquí está la MAGIA de la comunicación entre contenedores:
    # "http://backend:3000" usa el nombre del servicio Docker como hostname.
    # Docker resuelve "backend" a la IP interna del contenedor en la red red-ci.
    location /api/ {
        proxy_pass http://backend:3000;

        # Cabeceras útiles para que el backend reciba info real del cliente
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tiempos de espera (timeouts)
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
